<template>
    <lightning-card title="Agentforce ACC Controller">
        <div class="slds-p-around_medium">

            <lightning-button
                label="Open Agent"
                variant="brand"
                onclick={handleOpen}>
            </lightning-button>

            <lightning-button
                label="Close Agent"
                variant="destructive"
                class="slds-m-left_small"
                onclick={handleClose}>
            </lightning-button>

            <div class="slds-m-top_medium">
                <lightning-input
                    label="Prompt"
                    value={prompt}
                    onchange={handlePromptChange}>
                </lightning-input>
            </div>

            <div class="slds-m-top_medium">
                <lightning-button
                    label="Send to Agent"
                    variant="success"
                    onclick={handleExecute}>
                </lightning-button>
            </div>

        </div>
    </lightning-card>
</template>
